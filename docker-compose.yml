# Sobe backend (API) e front-end (Vite) juntos para desenvolvimento local.
# Backend: http://localhost:8000 | Front-end: http://localhost:5173
services:
  nasdaq-monitor:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    environment:
      - DATABASE_URL=sqlite:////app/data/nasdaq_monitor.db
      - FRONTEND_ORIGIN=http://localhost:5173
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - nasdaq-monitor
    restart: unless-stopped
