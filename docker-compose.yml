# Sobe só o backend (API). O front-end (frontend/) é um projeto Vite separado —
# rode `npm run dev` nele localmente, ou publique frontend/dist num host estático
# (Render Static Site, Vercel, Netlify, Nginx) em produção. Ver README.
services:
  nasdaq-monitor:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    environment:
      - DATABASE_URL=sqlite:////app/data/nasdaq_monitor.db
    restart: unless-stopped
