{% extends "base.html" %}
{% block title %}{{ symbol }} - Monitor NASDAQ{% endblock %}
{% block content %}
  <h1>{{ symbol }} <span id="status" class="muted"></span></h1>

  <div class="chart-controls">
    <label class="field-label">Período
      <select id="period-select">
        <option value="1d">1 dia</option>
        <option value="5d" selected>5 dias</option>
        <option value="1mo">1 mês</option>
        <option value="3mo">3 meses</option>
      </select>
    </label>
    <label class="field-label">Intervalo
      <select id="interval-select">
        <option value="5m">5 min</option>
        <option value="15m" selected>15 min</option>
        <option value="1h">1 hora</option>
        <option value="1d">1 dia</option>
      </select>
    </label>
  </div>

  <canvas id="priceChart" height="140"></canvas>
  <canvas id="rsiChart" height="80"></canvas>
  <canvas id="macdChart" height="80"></canvas>
{% endblock %}

{% block scripts %}
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/date-fns@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-chart-financial@0.2.1"></script>
  <script>
    const symbol = {{ symbol|tojson }};
    let priceChart, rsiChart, macdChart;

    function buildCandles(data) {
      return data.timestamps.map((ts, i) => ({
        x: new Date(ts).getTime(),
        o: data.open[i],
        h: data.high[i],
        l: data.low[i],
        c: data.close[i],
      })).filter((c) => c.o !== null && c.h !== null && c.l !== null && c.c !== null);
    }

    function buildLinePoints(timestamps, values) {
      return timestamps.map((ts, i) => ({ x: new Date(ts).getTime(), y: values[i] }));
    }

    function renderCharts(data) {
      const candles = buildCandles(data);

      if (!priceChart) {
        priceChart = new Chart(document.getElementById('priceChart'), {
          type: 'candlestick',
          data: {
            datasets: [
              { label: symbol, data: candles },
              {
                type: 'line', label: 'EMA9', data: buildLinePoints(data.timestamps, data.ema_fast),
                borderColor: '#16a34a', pointRadius: 0, borderWidth: 1,
              },
              {
                type: 'line', label: 'EMA21', data: buildLinePoints(data.timestamps, data.ema_slow),
                borderColor: '#dc2626', pointRadius: 0, borderWidth: 1,
              },
            ],
          },
          options: { animation: false, scales: { x: { type: 'time' } } },
        });
      } else {
        priceChart.data.datasets[0].data = candles;
        priceChart.data.datasets[1].data = buildLinePoints(data.timestamps, data.ema_fast);
        priceChart.data.datasets[2].data = buildLinePoints(data.timestamps, data.ema_slow);
        priceChart.update('none');
      }

      const rsiPoints = buildLinePoints(data.timestamps, data.rsi);
      if (!rsiChart) {
        rsiChart = new Chart(document.getElementById('rsiChart'), {
          type: 'line',
          data: { datasets: [{ label: 'RSI', data: rsiPoints, borderColor: '#9333ea', pointRadius: 0 }] },
          options: { animation: false, scales: { x: { type: 'time' }, y: { min: 0, max: 100 } } },
        });
      } else {
        rsiChart.data.datasets[0].data = rsiPoints;
        rsiChart.update('none');
      }

      const macdPoints = buildLinePoints(data.timestamps, data.macd);
      const signalPoints = buildLinePoints(data.timestamps, data.macd_signal);
      if (!macdChart) {
        macdChart = new Chart(document.getElementById('macdChart'), {
          type: 'line',
          data: {
            datasets: [
              { label: 'MACD', data: macdPoints, borderColor: '#2563eb', pointRadius: 0 },
              { label: 'Signal', data: signalPoints, borderColor: '#f59e0b', pointRadius: 0 },
            ],
          },
          options: { animation: false, scales: { x: { type: 'time' } } },
        });
      } else {
        macdChart.data.datasets[0].data = macdPoints;
        macdChart.data.datasets[1].data = signalPoints;
        macdChart.update('none');
      }
    }

    async function loadChart() {
      const period = document.getElementById('period-select').value;
      const interval = document.getElementById('interval-select').value;
      const res = await fetch(`/api/chart/${symbol}?period=${period}&interval=${interval}`);
      if (!res.ok) {
        document.getElementById('status').textContent = 'Erro ao carregar dados históricos.';
        return;
      }
      const data = await res.json();
      document.getElementById('status').textContent =
        `${data.timestamps.length} pontos — atualizado ${new Date().toLocaleTimeString('pt-BR')}`;
      renderCharts(data);
    }

    document.getElementById('period-select').addEventListener('change', loadChart);
    document.getElementById('interval-select').addEventListener('change', loadChart);

    loadChart();
    setInterval(loadChart, 30000);
  </script>
{% endblock %}
